name: WorldTree
options:
  bundleIdPrefix: com.forgeandcode
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: "F75F8Z9ZPZ"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: "Manual"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_HARDENED_RUNTIME: "YES"
    PROVISIONING_PROFILE_SPECIFIER: ""
    ENABLE_MODULE_STABILITY: "YES"
    SWIFT_STRICT_CONCURRENCY: complete
    DEAD_CODE_STRIPPING: "YES"
  configs:
    Debug:
      SWIFT_COMPILATION_MODE: incremental
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      GCC_OPTIMIZATION_LEVEL: "-O0"
      ENABLE_TESTABILITY: "YES"
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: "-O"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.24.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.2.0

targets:
  WorldTreeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: WorldTree
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgeandcode.world-tree-tests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/World Tree.app/Contents/MacOS/World Tree"
        BUNDLE_LOADER: "$(TEST_HOST)"

  WorldTree:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "_Archive/**"
      - path: Resources/highlight.min.js
        buildPhase: resources
      - path: Resources/highlight-github-dark.min.css
        buildPhase: resources
      - path: Resources/mermaid.min.js
        buildPhase: resources
      - path: Resources/vis-network.min.js
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: GRDB
      - package: SwiftTerm
      - sdk: Carbon.framework
    postBuildScripts:
      - script: |
          # Auto-install to /Applications so TCC grants (Screen Recording, etc.) persist.
          # Without this, Xcode Run launches from DerivedData — a volatile path that
          # loses TCC permissions on every rebuild.
          APP_SRC="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"
          APP_DST="/Applications/${PRODUCT_NAME}.app"
          if [ -d "$APP_SRC" ]; then
            killall "${PRODUCT_NAME}" 2>/dev/null; sleep 0.5; true
            ditto "$APP_SRC" "$APP_DST"
          fi
        name: "Install to /Applications"
        basedOnDependencyAnalysis: false
    entitlements:
      path: WorldTree.entitlements
      properties:
        # Hardened Runtime: allow locally-compiled SPM libraries (GRDB, SwiftTerm)
        # that are not separately signed by Apple.
        com.apple.security.cs.disable-library-validation: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgeandcode.world-tree
        PRODUCT_NAME: "World Tree"
        PRODUCT_MODULE_NAME: WorldTree
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: false
        INFOPLIST_KEY_LSMultipleInstancesProhibited: true
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "World Tree needs microphone access for voice input so you can talk to Cortana instead of typing."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "World Tree uses on-device speech recognition to transcribe your voice into text."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "World Tree uses Apple Events to open terminal sessions."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"

schemes:
  WorldTree:
    build:
      targets:
        WorldTree: all
        WorldTreeTests: [test]
    run:
      config: Debug
      executable:
        filePath: /Applications/World Tree.app
    test:
      config: Debug
      targets:
        - WorldTreeTests
