name: WorldTree
options:
  bundleIdPrefix: com.forgeandcode
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: "F75F8Z9ZPZ"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: "Manual"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_HARDENED_RUNTIME: "YES"
    PROVISIONING_PROFILE_SPECIFIER: ""
    ENABLE_MODULE_STABILITY: "YES"
    SWIFT_STRICT_CONCURRENCY: complete
    DEAD_CODE_STRIPPING: "YES"
  configs:
    Debug:
      SWIFT_COMPILATION_MODE: incremental
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      GCC_OPTIMIZATION_LEVEL: "-O0"
      ENABLE_TESTABILITY: "YES"
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: "-O"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.24.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.2.0

targets:
  WorldTreeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: WorldTree
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgeandcode.world-tree-tests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/World Tree.app/Contents/MacOS/World Tree"
        BUNDLE_LOADER: "$(TEST_HOST)"

  WorldTree:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "_Archive/**"
      - path: Resources/highlight.min.js
        buildPhase: resources
      - path: Resources/highlight-github-dark.min.css
        buildPhase: resources
      - path: Resources/mermaid.min.js
        buildPhase: resources
      - path: Resources/vis-network.min.js
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: GRDB
      - package: SwiftTerm
      - sdk: Carbon.framework
    postBuildScripts:
      - script: |
          # Guard: skip for test builds and non-build actions (clean, analyze).
          # codesign --deep fails on .xctest bundles with "bundle format unrecognized",
          # and the /Applications install is unnecessary for test runs. (TASK-094)
          if [ "${ACTION}" != "build" ] && [ "${ACTION}" != "build-for-testing" ]; then
            echo "note: Skipping install — action is '${ACTION}', not 'build'"
            exit 0
          fi
          # build-for-testing / xcodebuild test: skip install entirely —
          # Testing.framework embedding breaks codesign --deep
          if [ "${ACTION}" = "build-for-testing" ] || [ -n "${TEST_HOST}" ] || [ -d "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Frameworks/Testing.framework" ]; then
            echo "note: Skipping install — test build detected"
            exit 0
          fi
          if [ "${WRAPPER_EXTENSION}" = "xctest" ]; then
            echo "note: Skipping install — building test bundle, not app"
            exit 0
          fi
          # Staged builds: the rebuild watcher handles kill+copy+sign after build
          # succeeds. Skipping here prevents killing World Tree mid-build.
          if [ "${WT_STAGED_BUILD}" = "1" ]; then
            echo "note: Staged build — watcher will handle install"
            exit 0
          fi
          # Non-standard DerivedData means a build check (e.g., -derivedDataPath /tmp/...).
          # Never install to /Applications from a build check — it corrupts the CDHash.
          STANDARD_DD="${HOME}/Library/Developer/Xcode/DerivedData"
          SYMLINKED_DD=$(readlink "${STANDARD_DD}" 2>/dev/null || echo "${STANDARD_DD}")
          case "${BUILD_DIR}" in
            "${STANDARD_DD}"*|"${SYMLINKED_DD}"*) ;; # Normal build — continue
            *) echo "note: Non-standard DerivedData — skipping install to /Applications"
               exit 0 ;;
          esac

          # Auto-install to /Applications so TCC grants (Screen Recording, etc.) persist.
          # Without this, Xcode Run launches from DerivedData — a volatile path that
          # loses TCC permissions on every rebuild.
          #
          # NOTE: DerivedData may live on an external volume (U34 Bolt). Cross-volume
          # ditto can strip the embedded code signature. We re-sign after copy to ensure
          # the /Applications copy is always valid.
          # Skip install during test builds — the embedded .xctest bundle
          # causes codesign --deep to fail with "bundle format unrecognized".
          if [ "${ACTION}" = "test" -o "${ACTION}" = "analyze" ]; then
            exit 0
          fi
          APP_SRC="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"
          APP_DST="/Applications/${PRODUCT_NAME}.app"
          if [ -d "$APP_SRC" ]; then
            killall "${PRODUCT_NAME}" 2>/dev/null; sleep 0.5; true
            ditto "$APP_SRC" "$APP_DST"
            # Re-sign after cross-volume copy — preserves TeamIdentifier and entitlements.
            # Use EXPANDED_CODE_SIGN_IDENTITY (the cert SHA-1 hash, unambiguous) rather
            # than the display name which can match multiple certs and fail with "ambiguous".
            # Remove embedded .xctest bundles before signing — codesign --deep
            # fails with "bundle format unrecognized" on .xctest bundles.
            find "$APP_DST" -name "*.xctest" -type d -exec rm -rf {} + 2>/dev/null; true
            # Strip ALL test frameworks/dylibs — embedded by build-for-testing, breaks codesign --deep
            rm -rf "$APP_DST/Contents/Frameworks/Testing.framework" 2>/dev/null; true
            rm -rf "$APP_DST/Contents/Frameworks/XCTest.framework" 2>/dev/null; true
            rm -rf "$APP_DST/Contents/Frameworks/XCTestCore.framework" 2>/dev/null; true
            rm -rf "$APP_DST/Contents/Frameworks/XCTestSupport.framework" 2>/dev/null; true
            rm -rf "$APP_DST/Contents/Frameworks/XCTAutomationSupport.framework" 2>/dev/null; true
            rm -rf "$APP_DST/Contents/Frameworks/XCUIAutomation.framework" 2>/dev/null; true
            rm -rf "$APP_DST/Contents/Frameworks/XCUnit.framework" 2>/dev/null; true
            rm -f "$APP_DST/Contents/Frameworks/libXCTestBundleInject.dylib" 2>/dev/null; true
            rm -f "$APP_DST/Contents/Frameworks/libXCTestSwiftSupport.dylib" 2>/dev/null; true
            codesign --force --deep --sign "${EXPANDED_CODE_SIGN_IDENTITY}" \
              --entitlements "${CODE_SIGN_ENTITLEMENTS}" \
              --options runtime \
              --timestamp=none \
              "$APP_DST"
            # Flush runningboardd's CDHash cache so macOS accepts the new signature
            # immediately. Without this, taskgated kills the restarted process because
            # it still has the old CDHash cached from the previous binary.
            killall runningboardd 2>/dev/null || true
            sleep 1
            # Restart the KeepAlive service with the freshly signed binary.
            launchctl kickstart -k "gui/$(id -u)/com.forgeandcode.world-tree" 2>/dev/null || true
          fi
        name: "Install to /Applications"
        basedOnDependencyAnalysis: false
    entitlements:
      path: WorldTree.entitlements
      properties:
        # Hardened Runtime: allow locally-compiled SPM libraries (GRDB, SwiftTerm)
        # that are not separately signed by Apple.
        com.apple.security.cs.disable-library-validation: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgeandcode.world-tree
        PRODUCT_NAME: "World Tree"
        PRODUCT_MODULE_NAME: WorldTree
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: false
        INFOPLIST_KEY_LSMultipleInstancesProhibited: true
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "World Tree needs microphone access for voice input so you can talk to Cortana instead of typing."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "World Tree uses on-device speech recognition to transcribe your voice into text."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "World Tree uses Apple Events to open terminal sessions."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "12"

schemes:
  WorldTree:
    build:
      targets:
        WorldTree: all
        WorldTreeTests: [test]
    run:
      config: Debug
      executable:
        filePath: /Applications/World Tree.app
    test:
      config: Debug
      targets:
        - WorldTreeTests
