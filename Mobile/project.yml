name: WorldTreeMobile
options:
  bundleIdPrefix: com.evanprimeau
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    majorVersion: "6.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  WorldTreeMobile:
    type: application
    platform: iOS
    sources:
      - path: WorldTreeMobile
        excludes:
          - Resources/Assets.xcassets
      - path: WorldTreeMobile/Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: GRDB
        product: GRDB
      - target: WorldTreeShare
        embed: true
      - target: WorldTreeWidget
        embed: true
      - target: WorldTreeWatch
        embed: true
    info:
      path: WorldTreeMobile/Info.plist
      properties:
        CFBundleDisplayName: World Tree
        CFBundleURLTypes:
          - CFBundleURLName: com.evanprimeau.world-tree-mobile
            CFBundleURLSchemes:
              - worldtree
        NSBonjourServices:
          - _worldtree._tcp
        NSLocalNetworkUsageDescription: "World Tree uses the local network to discover and connect to the World Tree Mac app on your network."
        NSMicrophoneUsageDescription: "World Tree uses the microphone for voice dictation so you can speak your messages hands-free."
        NSSpeechRecognitionUsageDescription: "World Tree uses speech recognition to transcribe your voice into text messages."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UILaunchScreen:
          UIColorName: ""
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: WorldTreeMobile/WorldTreeMobile.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.evanprimeau.worldtree
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evanprimeau.world-tree-mobile
        PRODUCT_NAME: "WorldTreeMobile"
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6JB5KB6D47
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete

  WorldTreeShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WorldTreeShare
    info:
      path: WorldTreeShare/Info.plist
      properties:
        CFBundleDisplayName: World Tree Share
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionActivationRule:
            NSExtensionActivationSupportsText: true
            NSExtensionActivationSupportsWebPageWithMaxCount: 1
    entitlements:
      path: WorldTreeShare/WorldTreeShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.evanprimeau.worldtree
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evanprimeau.world-tree-mobile.share
        PRODUCT_NAME: WorldTreeShare
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6JB5KB6D47
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_STRICT_CONCURRENCY: complete

  WorldTreeWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WorldTreeWidget
    info:
      path: WorldTreeWidget/Info.plist
      properties:
        CFBundleDisplayName: World Tree Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WorldTreeWidget/WorldTreeWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.evanprimeau.worldtree
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evanprimeau.world-tree-mobile.widget
        PRODUCT_NAME: WorldTreeWidget
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6JB5KB6D47
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_STRICT_CONCURRENCY: complete

  WorldTreeWatch:
    type: watchos.application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WorldTreeWatch
    info:
      path: WorldTreeWatch/Info.plist
      properties:
        CFBundleDisplayName: World Tree
        WKApplication: true
    entitlements:
      path: WorldTreeWatch/WorldTreeWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.evanprimeau.worldtree
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evanprimeau.world-tree-mobile.watchkitapp
        PRODUCT_NAME: WorldTreeWatch
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6JB5KB6D47
        SWIFT_VERSION: "5.9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SWIFT_STRICT_CONCURRENCY: complete

  WorldTreeMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WorldTreeMobileTests
    dependencies:
      - target: WorldTreeMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evanprimeau.world-tree-mobile-tests
        PRODUCT_NAME: WorldTreeMobileTests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: complete
